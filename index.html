<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hours — Life Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e11;--surface:#16161c;--surface2:#1e1e27;--border:#2a2a38;
  --accent:#c8ff5a;--accent2:#ff6b6b;--accent3:#6baaff;
  --text:#f0f0f4;--muted:#7a7a94;--radius:12px;--trans:0.18s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(14,14,17,0.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;height:54px;padding:0 16px;gap:10px;}
.nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:var(--accent);letter-spacing:-0.02em;margin-right:auto;}
.nav-tabs{display:flex;gap:3px;}
.nav-tab{padding:6px 13px;border-radius:8px;border:none;background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem;cursor:pointer;transition:var(--trans);}
.nav-tab:hover{color:var(--text);background:var(--surface2);}
.nav-tab.active{color:var(--bg);background:var(--accent);font-weight:500;}

/* SYNC STATUS */
.sync-badge{display:flex;align-items:center;gap:5px;font-size:0.68rem;padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:var(--trans);white-space:nowrap;}
.sync-badge:hover{border-color:var(--accent);}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sync-dot.green{background:#4ade80;}
.sync-dot.yellow{background:#fbbf24;animation:pulse 1.2s infinite;}
.sync-dot.red{background:#f87171;}
.sync-dot.grey{background:var(--muted);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* LAYOUT */
.app{padding:22px 16px;max-width:1080px;margin:0 auto;}
.view{display:none;}
.view.active{display:block;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.section-label{font-size:0.68rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}

/* AUTH SCREEN */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:20px;text-align:center;}
.auth-title{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:var(--accent);}
.auth-sub{color:var(--muted);font-size:0.85rem;max-width:340px;line-height:1.6;}
.auth-btn{background:var(--accent);color:var(--bg);border:none;border-radius:12px;padding:14px 32px;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:10px;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,255,90,0.25);}
.auth-btn svg{width:20px;height:20px;}
.auth-err{color:var(--accent2);font-size:0.75rem;max-width:360px;line-height:1.5;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:8px;padding:10px 14px;}

/* TODAY */
.today-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.today-date{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-0.03em;line-height:1.1;}
.today-day{font-size:0.78rem;color:var(--muted);margin-top:3px;}
.today-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.meta-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:0.74rem;}
.meta-pill label{color:var(--muted);}
.meta-pill input{background:none;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:0.76rem;width:75px;outline:none;}
.hour-grid{display:grid;grid-template-columns:repeat(24,1fr);gap:3px;margin-bottom:6px;}
.hour-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 2px 6px;background:var(--surface);border-radius:6px;cursor:pointer;transition:var(--trans);min-height:64px;border:1px solid transparent;}
.hour-cell:hover{border-color:var(--border);}
.hr-label{font-size:0.56rem;color:var(--muted);}
.hr-dot{width:26px;height:26px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--muted);transition:var(--trans);font-weight:500;}
.hour-cell.filled .hr-dot{color:var(--bg);font-weight:700;}
.day-summary{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;}
.summary-chip{display:flex;align-items:center;gap:5px;background:var(--surface);border-radius:8px;padding:4px 10px;font-size:0.7rem;}
.comment-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.comment-box textarea{width:100%;background:none;border:none;color:var(--text);font-family:'Lora',serif;font-size:0.88rem;resize:none;outline:none;min-height:66px;line-height:1.65;}
.comment-box textarea::placeholder{color:var(--muted);font-style:italic;}
.save-btn{margin-top:14px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:11px 26px;font-family:'Syne',sans-serif;font-size:0.84rem;font-weight:700;cursor:pointer;transition:var(--trans);}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,255,90,0.22);}
.save-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.save-msg{display:inline-block;margin-left:12px;font-size:0.74rem;color:var(--accent);opacity:0;transition:opacity 0.4s;}
.save-msg.show{opacity:1;}
.save-msg.err{color:var(--accent2);}

/* CAT PICKER */
.cat-picker{position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px;display:none;grid-template-columns:1fr 1fr;gap:4px;width:258px;box-shadow:0 20px 60px rgba(0,0,0,0.7);}
.cat-picker.open{display:grid;}
.cat-option{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:0.7rem;transition:var(--trans);border:2px solid transparent;}
.cat-option:hover{background:var(--surface2);}
.cat-opt-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* CALENDAR */
.calendar-controls{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.month-nav{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.8rem;cursor:pointer;transition:var(--trans);}
.month-nav:hover{background:var(--surface2);}
.month-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;flex:1;text-align:center;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-header{text-align:center;font-size:0.63rem;color:var(--muted);padding:5px 0;letter-spacing:0.08em;}
.cal-day{background:var(--surface);border-radius:9px;border:1px solid transparent;position:relative;overflow:hidden;min-height:88px;transition:var(--trans);cursor:default;}
.cal-day.has-entry{cursor:pointer;}
.cal-day.has-entry:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,0,0,0.35);}
.cal-day.today-marker{border-color:var(--accent)!important;}
.cal-day.empty{background:none;border-color:transparent;}
.cal-day-top{display:flex;justify-content:space-between;align-items:center;padding:5px 7px 2px;}
.cal-day-num{font-size:0.64rem;color:var(--muted);font-weight:500;}
.cal-day.today-marker .cal-day-num{color:var(--accent);font-weight:700;}
.cal-note-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.cal-hour-bars{padding:2px 5px 5px;display:flex;flex-direction:column;gap:2px;}
.cal-hour-row{display:flex;gap:2px;height:12px;}
.cal-hour-seg{flex:1;border-radius:2px;}

/* MODAL */
.day-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.day-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:440px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.75);}
.day-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.day-modal-date{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;}
.day-modal-close{background:var(--surface2);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1.1rem;line-height:28px;text-align:center;}
.dm-hour-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-bottom:8px;}
.dm-hr{height:28px;border-radius:3px;background:var(--surface2);}
.day-modal-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.dm-chip{font-size:0.68rem;padding:3px 9px;border-radius:100px;}
.day-modal-comment{font-family:'Lora',serif;font-size:0.84rem;color:var(--muted);font-style:italic;line-height:1.55;}
.day-modal-meta{font-size:0.7rem;color:var(--muted);margin-top:8px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.stat-card-label{font-size:0.66rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px;}
.stat-card-value{font-family:'Syne',sans-serif;font-weight:800;font-size:1.9rem;letter-spacing:-0.03em;line-height:1;}
.stat-card-sub{font-size:0.7rem;color:var(--muted);margin-top:4px;}
.donut-wrap{display:flex;justify-content:center;margin-bottom:18px;}
.cat-stats{display:flex;flex-direction:column;gap:7px;margin-bottom:22px;}
.cat-stat-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:10px;padding:9px 13px;}
.cat-stat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cat-stat-name{font-size:0.75rem;width:130px;flex-shrink:0;}
.cat-stat-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.cat-stat-bar{height:100%;border-radius:3px;transition:width 0.7s cubic-bezier(.4,0,.2,1);}
.cat-stat-hrs{font-size:0.7rem;color:var(--muted);width:60px;text-align:right;}

/* HISTORY */
.history-list{display:flex;flex-direction:column;gap:7px;}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.history-item:hover{border-color:var(--accent);}
.hi-date{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;min-width:90px;}
.hi-bars{display:flex;gap:1.5px;width:140px;height:22px;align-items:flex-end;flex-shrink:0;}
.hi-bar{flex:1;border-radius:2px;min-height:3px;}
.hi-comment{font-size:0.7rem;color:var(--muted);flex:1;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:60px;}
.hi-chips{display:flex;gap:4px;flex-wrap:wrap;}
.hi-chip{font-size:0.6rem;padding:2px 7px;border-radius:100px;}

/* LOADING OVERLAY */
.loading-overlay{position:fixed;inset:0;background:rgba(14,14,17,0.85);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.8rem;color:var(--muted);}

@media(max-width:640px){
  .hour-grid{grid-template-columns:repeat(12,1fr);}
  .hour-cell{min-height:52px;}
  .hr-dot{width:22px;height:22px;font-size:0.54rem;}
  .today-date{font-size:1.55rem;}
  .cal-day{min-height:72px;}
  .cal-hour-row{height:9px;}
  .cat-stat-name{width:90px;}
  .hi-bars{width:96px;}
  .sync-badge span{display:none;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">⏱ Hours</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('today')">Today</button>
    <button class="nav-tab" onclick="showView('calendar')">Calendar</button>
    <button class="nav-tab" onclick="showView('stats')">Stats</button>
    <button class="nav-tab" onclick="showView('history')">Log</button>
  </div>
  <div class="sync-badge" id="sync-badge" onclick="handleSyncClick()" title="Google Sheets sync status">
    <div class="sync-dot grey" id="sync-dot"></div>
    <span id="sync-label">Not signed in</span>
  </div>
</nav>

<div class="app">

  <!-- AUTH SCREEN -->
  <div class="view active" id="view-auth">
    <div class="auth-screen">
      <div class="auth-title">⏱ Hours</div>
      <div class="auth-sub">Sign in with Google to sync your entries across all your devices via Google Sheets.</div>
      <button class="auth-btn" onclick="signIn()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
      <div class="auth-err" id="auth-err" style="display:none"></div>
    </div>
  </div>

  <!-- TODAY -->
  <div class="view" id="view-today">
    <div class="today-header">
      <div>
        <div class="today-date" id="today-date-label"></div>
        <div class="today-day" id="today-day-label"></div>
      </div>
      <div class="today-meta">
        <div class="meta-pill"><label>₱ spent</label><input type="number" id="input-spent" placeholder="—" min="0" step="0.01"></div>
        <div class="meta-pill"><label>kg</label><input type="number" id="input-kg" placeholder="—" min="0" step="0.1"></div>
      </div>
    </div>
    <div class="section-label">24-Hour Log — tap a slot to assign category</div>
    <div class="hour-grid" id="hour-grid"></div>
    <div class="day-summary" id="day-summary"></div>
    <div style="margin-top:14px">
      <div class="section-label" style="margin-bottom:8px">Highlights / Notes</div>
      <div class="comment-box"><textarea id="input-comment" placeholder="What made today memorable?"></textarea></div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveToday()">Save Day</button>
    <span class="save-msg" id="save-msg"></span>
  </div>

  <!-- CALENDAR -->
  <div class="view" id="view-calendar">
    <div class="calendar-controls">
      <button class="month-nav" onclick="changeMonth(-1)">←</button>
      <div class="month-title" id="cal-month-label"></div>
      <button class="month-nav" onclick="changeMonth(1)">→</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

  <!-- STATS -->
  <div class="view" id="view-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-label" style="margin-bottom:12px">Time Distribution</div>
    <div class="donut-wrap"><canvas id="donut-canvas" width="200" height="200"></canvas></div>
    <div class="section-label" style="margin:16px 0 10px">Hours by Category</div>
    <div class="cat-stats" id="cat-stats"></div>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div class="section-label" style="margin-bottom:12px">All logged days — newest first</div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<!-- Cat Picker -->
<div class="cat-picker" id="cat-picker"></div>

<!-- Day Modal -->
<div class="day-modal-overlay" id="day-modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="day-modal">
    <div class="day-modal-header">
      <div class="day-modal-date" id="dm-date"></div>
      <button class="day-modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="dm-hour-grid" id="dm-hours-top"></div>
    <div class="dm-hour-grid" id="dm-hours-bot"></div>
    <div class="day-modal-chips" id="dm-chips"></div>
    <div class="day-modal-comment" id="dm-comment"></div>
    <div class="day-modal-meta" id="dm-meta"></div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading-overlay" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Loading…</div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>

function signIn(){
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: async (resp) => {
      if(resp.error){showAuthErr('Sign-in failed: '+resp.error);return;}
      accessToken = resp.access_token;
      localStorage.setItem('hours_gtoken', accessToken);
      await onSignedIn();
    }
  });
  client.requestAccessToken();
}

function handleSyncClick(){
  if(!accessToken) signIn();
  else { accessToken=null; localStorage.removeItem('hours_gtoken'); showView('auth'); setSyncStatus('grey','Not signed in'); }
}

function showAuthErr(msg){
  const el=document.getElementById('auth-err');el.textContent=msg;el.style.display='block';
}

//  GOOGLE SHEETS API
// ═══════════════════════════════════════════════════════════
const API = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

async function sheetsGet(range){
  const r=await fetch(`${API}/values/${encodeURIComponent(range)}`,{headers:{Authorization:'Bearer '+accessToken}});
  if(r.status===401){tokenExpired();return null;}
  return r.json();
}

async function sheetsAppend(values){
  const r=await fetch(`${API}/values/${encodeURIComponent(SHEET_NAME)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{
    method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
    body:JSON.stringify({values})
  });
  if(r.status===401){tokenExpired();return null;}
  return r.json();
}

async function sheetsUpdate(range, values){
  const r=await fetch(`${API}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,{
    method:'PUT',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
    body:JSON.stringify({values})
  });
  if(r.status===401){tokenExpired();return null;}
  return r.json();
}

async function ensureSheetHeader(){
  const res=await sheetsGet(`${SHEET_NAME}!A1:B1`);
  if(!res||!res.values||!res.values[0]||res.values[0][0]!=='date'){
    // Write header row
    await sheetsUpdate(`${SHEET_NAME}!A1`,[[
      'date','day',
      ...Array.from({length:24},(_,i)=>`h${i}`),
      'spent','kg','comment'
    ]]);
  }
}

function entryToRow(e){
  return [e.date, e.day||'', ...e.hours.map(h=>h===null?'':h), e.spent===null?'':e.spent, e.kg===null?'':e.kg, e.comment||''];
}

function rowToEntry(row){
  const hours=[];
  for(let i=2;i<=25;i++) hours.push(row[i]===''||row[i]===undefined?null:parseInt(row[i]));
  return {
    date:row[0], day:row[1]||'', hours,
    spent:row[26]===''||row[26]===undefined?null:parseFloat(row[26]),
    kg:row[27]===''||row[27]===undefined?null:parseFloat(row[27]),
    comment:row[28]||''
  };
}

async function loadFromSheets(){
  setSyncStatus('yellow','Syncing…');
  const res=await sheetsGet(`${SHEET_NAME}!A1:AC`);
  if(!res||!res.values){setSyncStatus('red','Sync error');return 0;}
  const rows=res.values;
  if(!rows.length||rows[0][0]!=='date'){setSyncStatus('red','Bad sheet');return 0;}
  const sheetEntries={};
  sheetsRowMap={};
  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    if(!row[0])continue;
    const entry=rowToEntry(row);
    sheetEntries[entry.date]=entry;
    sheetsRowMap[entry.date]=i+1;
  }
  // Merge: historical → overridden by sheet entries
  const hm={};HISTORICAL.forEach(e=>hm[e.date]={...e});
  Object.assign(hm,sheetEntries);
  allEntries=Object.values(hm).sort((a,b)=>a.date.localeCompare(b.date));
  setSyncStatus('green','Synced');
  return Object.keys(sheetEntries).length; // return count of rows in sheet
}

async function migrateHistoricalToSheets(){
  // Write all 82 historical entries in one batch append
  showLoading(`Importing 82 days of history into Google Sheets…`);
  const rows = HISTORICAL.map(e => entryToRow(e));
  // Batch in chunks of 20 to avoid payload limits
  const CHUNK = 20;
  for(let i=0; i<rows.length; i+=CHUNK){
    const chunk = rows.slice(i, i+CHUNK);
    document.getElementById('loading-text').textContent =
      `Importing… ${Math.min(i+CHUNK, rows.length)} / ${rows.length} days`;
    const r = await fetch(`${API}/values/${encodeURIComponent(SHEET_NAME)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{
      method:'POST',
      headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
      body:JSON.stringify({values:chunk})
    });
    if(r.status===401){tokenExpired();return;}
  }
  // Reload to build sheetsRowMap
  await loadFromSheets();
}

async function saveEntryToSheets(entry){
  setSyncStatus('yellow','Saving…');
  const row=entryToRow(entry);
  if(sheetsRowMap[entry.date]){
    // Update existing row
    const rowNum=sheetsRowMap[entry.date];
    await sheetsUpdate(`${SHEET_NAME}!A${rowNum}:AC${rowNum}`,[row]);
  } else {
    // Append new row
    await sheetsAppend([row]);
    // Reload row map so we know the row number next time
    await loadFromSheets();
  }
  setSyncStatus('green','Synced');
}

function tokenExpired(){
  accessToken=null;localStorage.removeItem('hours_gtoken');
  setSyncStatus('red','Session expired — tap to sign in again');
}

// ═══════════════════════════════════════════════════════════
//  INIT FLOW
// ═══════════════════════════════════════════════════════════
async function onSignedIn(){
  showLoading('Connecting to Google Sheets…');
  try {
    await ensureSheetHeader();
    const sheetRowCount = await loadFromSheets();
    // If sheet has no data rows yet, auto-migrate all 82 historical entries
    if(sheetRowCount === 0){
      await migrateHistoricalToSheets();
      setSyncStatus('green','Synced — 82 days imported!');
    } else {
      setSyncStatus('green','Synced');
    }
    initTodayView();
    const latest=allEntries.filter(e=>e.hours.some(h=>h!==null)).slice(-1)[0];
    if(latest){const ld=new Date(latest.date+'T00:00:00');calYear=ld.getFullYear();calMonth=ld.getMonth();}
    else{const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
    showView('today');
  } catch(err){
    setSyncStatus('red','Error: '+err.message);
    showAuthErr('Could not connect to Google Sheets: '+err.message);
    showView('auth');
  } finally { hideLoading(); }
}

// Try restoring token on load
window.addEventListener('load', ()=>{
  const saved=localStorage.getItem('hours_gtoken');
  if(saved){
    accessToken=saved;
    onSignedIn();
  } else {
    showView('auth');
    hideLoading();
  }
});

// ═══════════════════════════════════════════════════════════
//  TODAY VIEW
// ═══════════════════════════════════════════════════════════
function initTodayView(){
  const ex=getEntry(todayStr);
  todayHours = ex ? [...ex.hours] : new Array(24).fill(null);
  document.getElementById('input-spent').value=ex?.spent??'';
  document.getElementById('input-kg').value=ex?.kg??'';
  document.getElementById('input-comment').value=ex?.comment??'';
  const d=new Date();
  document.getElementById('today-date-label').textContent=`${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  document.getElementById('today-day-label').textContent=DAY_NAMES[d.getDay()];
  renderHourGrid();
}

function renderHourGrid(){
  const g=document.getElementById('hour-grid');g.innerHTML='';
  for(let h=0;h<24;h++){
    const cat=todayHours[h];const co=cat!==null&&cat>=0&&cat<=11?CATS[cat]:null;
    const c=document.createElement('div');c.className='hour-cell'+(co?' filled':'');
    c.innerHTML=`<div class="hr-label">${h.toString().padStart(2,'0')}</div><div class="hr-dot" style="${co?`background:${co.color}`:''}"> ${co?cat:'·'}</div>`;
    c.onclick=ev=>openPicker(h,ev);g.appendChild(c);
  }
  renderDaySummary();
}

function renderDaySummary(){
  const counts=getCatCounts(todayHours);const s=document.getElementById('day-summary');s.innerHTML='';
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([id,hrs])=>{
    const cat=CATS[parseInt(id)];const ch=document.createElement('div');ch.className='summary-chip';
    ch.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${cat.color}"></div>${cat.name} <span style="color:var(--muted);margin-left:4px">${hrs}h</span>`;
    s.appendChild(ch);
  });
}

async function saveToday(){
  if(!accessToken){showAuthErr('Please sign in first.');showView('auth');return;}
  const btn=document.getElementById('save-btn');
  const msg=document.getElementById('save-msg');
  btn.disabled=true;
  msg.className='save-msg';msg.textContent='Saving…';msg.style.opacity='1';
  try{
    const spent=parseFloat(document.getElementById('input-spent').value)||null;
    const kg=parseFloat(document.getElementById('input-kg').value)||null;
    const comment=document.getElementById('input-comment').value.trim();
    const d=new Date();
    const entry={date:todayStr,day:DAY_NAMES[d.getDay()],hours:[...todayHours],spent,kg,comment};
    await saveEntryToSheets(entry);
    // Update local
    const idx=allEntries.findIndex(e=>e.date===todayStr);
    if(idx>=0)allEntries[idx]=entry;else{allEntries.push(entry);allEntries.sort((a,b)=>a.date.localeCompare(b.date));}
    msg.className='save-msg show';msg.textContent='✓ Saved to Google Sheets!';
  } catch(err){
    msg.className='save-msg show err';msg.textContent='✗ Save failed: '+err.message;
  } finally{
    btn.disabled=false;
    setTimeout(()=>{msg.style.opacity='0';},3000);
  }
}

// ═══════════════════════════════════════════════════════════
//  CAT PICKER
// ═══════════════════════════════════════════════════════════
const picker=document.getElementById('cat-picker');
const clearO=document.createElement('div');clearO.className='cat-option';clearO.style.cssText='grid-column:1/-1;background:var(--surface2);color:var(--muted)';
clearO.innerHTML=`<div class="cat-opt-dot" style="background:var(--border)"></div>Clear`;clearO.onclick=()=>pickCat(null);picker.appendChild(clearO);
CATS.forEach(cat=>{const o=document.createElement('div');o.className='cat-option';o.style.color=cat.color;o.innerHTML=`<div class="cat-opt-dot" style="background:${cat.color}"></div>${cat.name}`;o.onclick=()=>pickCat(cat.id);picker.appendChild(o);});

function openPicker(hour,ev){
  pickerHour=hour;picker.classList.add('open');
  const r=ev.currentTarget.getBoundingClientRect();
  let top=r.bottom+window.scrollY+4,left=r.left+window.scrollX;
  if(left+262>window.innerWidth)left=window.innerWidth-266;
  if(top+350>window.innerHeight+window.scrollY)top=r.top+window.scrollY-354;
  picker.style.top=top+'px';picker.style.left=left+'px';
}
function pickCat(id){if(pickerHour!==null){todayHours[pickerHour]=id;renderHourGrid();}picker.classList.remove('open');pickerHour=null;}
document.addEventListener('click',e=>{if(!picker.contains(e.target)&&!e.target.closest('.hour-cell')){picker.classList.remove('open');pickerHour=null;}});

// ═══════════════════════════════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════════════════════════════
function changeMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}

function renderCalendar(){
  document.getElementById('cal-month-label').textContent=`${MONTH_NAMES[calMonth]} ${calYear}`;
  const grid=document.getElementById('calendar-grid');grid.innerHTML='';
  ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d=>{const h=document.createElement('div');h.className='cal-header';h.textContent=d;grid.appendChild(h);});
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry=getEntry(ds);
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const hasData=entry&&entry.hours.some(h=>h!==null);
    const cell=document.createElement('div');
    cell.className='cal-day'+(isToday?' today-marker':'')+(hasData?' has-entry':'');
    const top=document.createElement('div');top.className='cal-day-top';
    top.innerHTML=`<span class="cal-day-num">${d}</span>`;
    if(hasData&&entry.comment){const dot=document.createElement('div');dot.className='cal-note-dot';top.appendChild(dot);}
    cell.appendChild(top);
    if(hasData){
      const bw=document.createElement('div');bw.className='cal-hour-bars';
      for(let row=0;row<4;row++){
        const rEl=document.createElement('div');rEl.className='cal-hour-row';
        for(let col=0;col<6;col++){
          const hr=row*6+col;const cat=entry.hours[hr];
          const seg=document.createElement('div');seg.className='cal-hour-seg';
          seg.style.background=cat!==null&&cat>=0&&cat<=11?CATS[cat].color:'var(--surface2)';
          if(cat!==null&&cat>=0&&cat<=11)seg.style.opacity='0.88';
          rEl.appendChild(seg);
        }
        bw.appendChild(rEl);
      }
      cell.appendChild(bw);
      cell.onclick=()=>openDayModal(ds);
    }
    grid.appendChild(cell);
  }
}

// ═══════════════════════════════════════════════════════════
//  DAY MODAL
// ═══════════════════════════════════════════════════════════
function openDayModal(ds){
  const entry=getEntry(ds);if(!entry)return;
  const d=new Date(ds+'T00:00:00');
  document.getElementById('dm-date').textContent=`${DAY_NAMES[d.getDay()]} · ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  const topEl=document.getElementById('dm-hours-top');topEl.innerHTML='';
  const botEl=document.getElementById('dm-hours-bot');botEl.innerHTML='';
  for(let i=0;i<24;i++){
    const cat=entry.hours[i];const co=cat!==null&&cat>=0&&cat<=11?CATS[cat]:null;
    const b=document.createElement('div');b.className='dm-hr';b.style.background=co?co.color:'var(--surface2)';
    b.title=`${i.toString().padStart(2,'0')}:00${co?' — '+co.name:''}`;
    (i<12?topEl:botEl).appendChild(b);
  }
  const counts=getCatCounts(entry.hours);const ch=document.getElementById('dm-chips');ch.innerHTML='';
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([id,hrs])=>{const cat=CATS[parseInt(id)];const c=document.createElement('div');c.className='dm-chip';c.style.cssText=`background:${cat.color}22;color:${cat.color}`;c.textContent=`${cat.name} ${hrs}h`;ch.appendChild(c);});
  document.getElementById('dm-comment').textContent=entry.comment||'';
  const meta=[];if(entry.spent)meta.push(`₱${entry.spent.toLocaleString()}`);if(entry.kg)meta.push(`${entry.kg} kg`);
  document.getElementById('dm-meta').textContent=meta.join('  ·  ');
  document.getElementById('day-modal-overlay').style.display='flex';
}
function closeModal(ev){if(!ev||ev.target===document.getElementById('day-modal-overlay'))document.getElementById('day-modal-overlay').style.display='none';}

// ═══════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════
function renderStats(){
  const filled=allEntries.filter(e=>e.hours.some(h=>h!==null));
  const totalHrs=filled.reduce((a,e)=>a+e.hours.filter(h=>h!==null).length,0);
  const totalSpent=allEntries.reduce((a,e)=>a+(e.spent||0),0);
  const catHours=new Array(12).fill(0);
  filled.forEach(e=>e.hours.forEach(h=>{if(h!==null&&h>=0&&h<=11)catHours[h]++;}));
  const topIdx=catHours.indexOf(Math.max(...catHours));
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-card-label">Days Tracked</div><div class="stat-card-value" style="color:var(--accent)">${filled.length}</div><div class="stat-card-sub">of ${allEntries.length} total days</div></div>
    <div class="stat-card"><div class="stat-card-label">Hours Logged</div><div class="stat-card-value" style="color:var(--accent3)">${totalHrs.toLocaleString()}</div><div class="stat-card-sub">avg ${(totalHrs/Math.max(filled.length,1)).toFixed(1)} hrs/day</div></div>
    <div class="stat-card"><div class="stat-card-label">Total Spent</div><div class="stat-card-value" style="color:var(--accent2)">₱${totalSpent.toLocaleString('en',{maximumFractionDigits:0})}</div><div class="stat-card-sub">across ${allEntries.filter(e=>e.spent).length} days</div></div>
    <div class="stat-card"><div class="stat-card-label">Top Activity</div><div class="stat-card-value" style="color:${CATS[topIdx].color};font-size:1.1rem">${CATS[topIdx].name}</div><div class="stat-card-sub">${catHours[topIdx]} hours logged</div></div>`;
  drawDonut(catHours);
  const maxH=Math.max(...catHours,1);const cs=document.getElementById('cat-stats');cs.innerHTML='';
  catHours.map((h,i)=>({h,i})).sort((a,b)=>b.h-a.h).forEach(({h,i})=>{const cat=CATS[i];const row=document.createElement('div');row.className='cat-stat-row';row.innerHTML=`<div class="cat-stat-dot" style="background:${cat.color}"></div><div class="cat-stat-name">${cat.name}</div><div class="cat-stat-bar-wrap"><div class="cat-stat-bar" style="width:${(h/maxH*100).toFixed(1)}%;background:${cat.color}"></div></div><div class="cat-stat-hrs">${h}h</div>`;cs.appendChild(row);});
}
function drawDonut(catHours){
  const canvas=document.getElementById('donut-canvas');const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,200,200);const total=catHours.reduce((a,b)=>a+b,0);if(!total)return;
  let start=-Math.PI/2;const cx=100,cy=100,r=82,inner=50;
  catHours.forEach((h,i)=>{if(!h)return;const sl=(h/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+sl);ctx.closePath();ctx.fillStyle=CATS[i].color;ctx.fill();start+=sl;});
  ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#0e0e11';ctx.fill();
  ctx.fillStyle='#f0f0f4';ctx.font='bold 16px Syne,sans-serif';ctx.textAlign='center';ctx.fillText(total+'h',cx,cy+6);
}

// ═══════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════
function renderHistory(){
  const list=document.getElementById('history-list');list.innerHTML='';
  const filled=[...allEntries].reverse().filter(e=>e.hours.some(h=>h!==null));
  filled.forEach(entry=>{
    const item=document.createElement('div');item.className='history-item';
    const counts=getCatCounts(entry.hours);
    const chips=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([id,hrs])=>{const cat=CATS[parseInt(id)];return`<div class="hi-chip" style="background:${cat.color}22;color:${cat.color}">${cat.name} ${hrs}h</div>`;}).join('');
    const bars=entry.hours.map(h=>{const col=h!==null&&h>=0&&h<=11?CATS[h].color:'var(--surface2)';return`<div class="hi-bar" style="background:${col};height:${h!==null?100:20}%"></div>`;}).join('');
    const d=new Date(entry.date+'T00:00:00');
    item.innerHTML=`<div class="hi-date">${MONTH_SHORT[d.getMonth()]} ${d.getDate()}<span style="color:var(--muted);font-size:0.67rem;margin-left:5px">${entry.day||''}</span></div><div class="hi-bars">${bars}</div><div class="hi-comment">${entry.comment||'—'}</div><div class="hi-chips">${chips}</div>`;
    item.onclick=()=>openDayModal(entry.date);
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════
//  VIEW SWITCHER
// ═══════════════════════════════════════════════════════════
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  const tabs={auth:-1,today:0,calendar:1,stats:2,history:3};
  if(tabs[id]>=0) document.querySelectorAll('.nav-tab')[tabs[id]].classList.add('active');
  if(id==='calendar')renderCalendar();
  if(id==='stats')renderStats();
  if(id==='history')renderHistory();
}
</script>
